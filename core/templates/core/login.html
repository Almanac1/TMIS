{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TMIS Login</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <style>
    :root {
      --page-top: #f8fafc;
      --page-bottom: #eef2f7;
      --card-shadow: rgba(15, 23, 42, 0.08);
      --card-border: #e9edf4;
      --field-border: #d0d7e2;
      --field-focus: #6d7f98;
      --btn-bg: #5d718d;
      --btn-hover: #4f637f;
      --btn-focus-ring: rgba(93, 113, 141, 0.25);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.5rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--card-border);
      border-radius: 1.1rem;
      box-shadow: 0 20px 50px var(--card-shadow);
    }

    .logo-wrap {
      display: grid;
      place-items: center;
      margin: 0 auto 1.5rem;
    }

    .logo-wrap img {
      width: 86px;
      height: 86px;
      object-fit: contain;
    }

    .login-subtitle {
      font-size: 0.95rem;
    }

    .form-control {
      border-color: var(--field-border);
      padding-top: 0.62rem;
      padding-bottom: 0.62rem;
    }

    .form-control:focus {
      border-color: var(--field-focus);
      box-shadow: 0 0 0 0.2rem var(--btn-focus-ring);
    }

    .btn-login {
      background-color: var(--btn-bg);
      border-color: var(--btn-bg);
      color: #fff;
      padding-top: 0.62rem;
      padding-bottom: 0.62rem;
      font-weight: 600;
    }

    .btn-login:hover,
    .btn-login:focus {
      background-color: var(--btn-hover);
      border-color: var(--btn-hover);
      color: #fff;
    }

    .btn-login:focus-visible {
      box-shadow: 0 0 0 0.2rem var(--btn-focus-ring);
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="card login-card">
      <div class="card-body p-4 p-md-5">
        <div class="logo-wrap" aria-label="TM logo">
          <img src="{% static 'core/images/tmis-logo.svg' %}" alt="TM Logo">
        </div>

        <h1 class="h4 text-center mb-2">Sign in</h1>
        <p class="text-center text-muted mb-4 pb-1 login-subtitle">Use your TMIS account credentials.</p>

        {% if messages %}
          {% for message in messages %}
            {% if forloop.last %}
              <div class="alert alert-{{ message.tags|default:'info' }} mb-3" role="alert">
                {{ message }}
              </div>
            {% endif %}
          {% endfor %}
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next|default:'' }}">

          <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input
              id="id_email"
              name="email"
              type="email"
              class="form-control"
              autocomplete="email"
              required
              value="{{ email|default:'' }}"
            >
          </div>

          <div class="mb-4">
            <label for="id_password" class="form-label">Password</label>
            <input
              id="id_password"
              name="password"
              type="password"
              class="form-control"
              autocomplete="current-password"
              required
            >
          </div>

          <button type="submit" class="btn btn-login w-100">Log In</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
